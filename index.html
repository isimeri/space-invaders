<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <main class="supreme-container">
        <h1 class="title">Space Invaders</h1>
        <div class="grid">
            <div class="grid-left">
                <h2>Instructions</h2>
                <p class="description">
                    Defeat all the alien invaders before they reach the ground. Good luck, hero!
                </p>
                <div class="instructions-container">
                    <p><span class="faded-text">Move:</span> left & right arrows</p>
                    <p><span class="faded-text">Shoot:</span> Z</p>
                </div>

                <p class="game-over-message hidden">sample text</p>
                <button class="start-btn">Start</button>
                <button class="restart-btn display-none">Restart</button>
            </div>
            <div class="board"></div>
        </div>
    </main>
    <footer>
        <p>Developed by <a class="author" href="https://github.com/isimeri">isimeri</a></p>
    </footer>
</body>
</html>
